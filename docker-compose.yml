services:
  postgres:
    image: postgres:15
    container_name: classifier-db
    environment:
      POSTGRES_DB: classifier
      POSTGRES_USER: classifier
      POSTGRES_PASSWORD: classifier
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: classifier-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/classifier
      SPRING_DATASOURCE_USERNAME: classifier
      SPRING_DATASOURCE_PASSWORD: classifier
    depends_on:
      - postgres

volumes:
  pgdata:
